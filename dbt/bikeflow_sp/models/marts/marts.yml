version: 2

models:
  - name: mart_station_status_hourly
    columns:
      - name: station_id
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null
      - name: snapshot_hour
        tests:
          - not_null

  - name: mart_network_status_hourly
    columns:
      - name: snapshot_date
        tests:
          - not_null
      - name: snapshot_hour
        tests:
          - not_null
      - name: station_count
        tests:
          - not_null

  - name: mart_station_risk_summary
    columns:
      - name: station_id
        tests:
          - not_null
      - name: bike_shortage_hour_rate
        tests:
          - not_null

  - name: mart_station_status_hourly_enriched
    columns:
      - name: station_id
        tests:
          - not_null
      - name: station_name
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null
      - name: snapshot_hour
        tests:
          - not_null
  - name: mart_station_risk_summary_enriched
    columns:
      - name: station_id
        tests:
          - not_null
          - unique
      - name: station_name
        tests:
          - not_null
      - name: bike_shortage_hour_rate
        tests:
          - not_null

  - name: mart_station_status_latest_enriched
    columns:
      - name: station_id
        tests:
          - not_null
          - unique
      - name: station_name
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null
      - name: snapshot_hour
        tests:
          - not_null
