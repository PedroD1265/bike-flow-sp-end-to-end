services:
  postgres:
    image: postgres:15
    container_name: bikeflow-postgres
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bikeflow-net

  kestra:
    build:
      context: .
      dockerfile: kestra/Dockerfile
    container_name: bikeflow-kestra
    user: "root"
    command: server standalone
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/home/kestra/.config/gcloud/application_default_credentials.json}
      DBT_PROFILES_DIR: ${DBT_PROFILES_DIR:-/home/kestra/.dbt}
      CLOUDSDK_CONFIG: ${CLOUDSDK_CONFIG:-/home/kestra/.config/gcloud}
      WORKSPACE_DIR: ${WORKSPACE_DIR:-/workspace}
      KESTRA_CONFIGURATION: |
        datasources:
          default:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra

        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
    ports:
      - "8080:8080"
    volumes:
      - ./kestra/flows:/app/flows
      - ./:${WORKSPACE_DIR:-/workspace}
      - /var/run/docker.sock:/var/run/docker.sock
      - ${GCLOUD_CONFIG_DIR:-${HOME}/.config/gcloud}:${CLOUDSDK_CONFIG:-/home/kestra/.config/gcloud}
      - ${DBT_PROFILES_HOST_DIR:-${HOME}/.dbt}:${DBT_PROFILES_DIR:-/home/kestra/.dbt}:ro
    depends_on:
      - postgres
    networks:
      - bikeflow-net

  redpanda:
    image: redpandadata/redpanda:v24.1.8
    container_name: bikeflow-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
    ports:
      - "19092:19092"
    networks:
      - bikeflow-net

  flink-jobmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    container_name: bikeflow-flink-jobmanager
    user: "root"
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
    volumes:
      - ./flink/jobs:/opt/flink/jobs
      - ./flink/lib/flink-sql-connector-kafka-1.17.2.jar:/opt/flink/lib/flink-sql-connector-kafka-1.17.2.jar
      - ./data:/opt/flink/data
    networks:
      - bikeflow-net

  flink-taskmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    container_name: bikeflow-flink-taskmanager
    user: "root"
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
    volumes:
      - ./flink/jobs:/opt/flink/jobs
      - ./flink/lib/flink-sql-connector-kafka-1.17.2.jar:/opt/flink/lib/flink-sql-connector-kafka-1.17.2.jar
      - ./data:/opt/flink/data
    networks:
      - bikeflow-net

volumes:
  postgres_data:
  kestra_storage:

networks:
  bikeflow-net:
    driver: bridge
